<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protege Mulher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="painel">
        <button id="emergency">🚨 EMERGENCIA</button>
        <title id="title">Cadastro de emergencia</title>
        <button id="cadastrar"> 👩 Cadastro</button>
    </div>
    <form action="" id="form">
        <input class="input" id="nome" type="text" placeholder="Seu nome completo">
        <input class="input" id="denuncia" type="text" placeholder="Sua denuncia">
        <input class="input" id="onde" type="text" placeholder="Onde podemos te ajudar?">
        <input class="input" id="contato" type="text" placeholder="Seu contato">
        <button onclick="acionar(this.parentElement)">DENUNCIAR AGORA!</button>
    </form>

    <script>
        function acionar(formulario) {
            const nome = formulario.querySelector("#nome").value
            const denuncia = formulario.querySelector("#denuncia").value
            const onde = formulario.querySelector("#onde").value
            const contato = formulario.querySelector("#contato").value
            let confirmacao = confirm(`Olá ${nome}, Confirme seus dados e denuncie: Você é ${nome}, podemos entrar em contato com você por ${contato} e sua denuncia é ${denuncia}, certo?`)
            if (confirmacao) {
                alert(`Ajuda a caminho, não se preucupe ${nome}, iremos te ajudar!`)
            }
        }
    </script>
</body>
</html>
